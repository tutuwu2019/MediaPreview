name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, e.g. v1.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release-tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
            if ([string]::IsNullOrWhiteSpace($tag)) {
              throw "workflow_dispatch requires input tag"
            }
            "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "tag=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-tag.outputs.tag }}

      - name: Install Qt
        id: install-qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.3"
          host: windows
          target: desktop
          arch: win64_mingw
          tools: tools_mingw1310

      - name: Configure
        shell: pwsh
        run: |
          $env:QT_ROOT = "${{ steps.install-qt.outputs.qtPath }}/Qt/${{ steps.install-qt.outputs.qtVersion }}/mingw_64"
          $env:MINGW_ROOT = "${{ steps.install-qt.outputs.qtPath }}/Tools/mingw1310_64"
          cmake --preset mingw-release

      - name: Build
        shell: pwsh
        run: |
          $env:QT_ROOT = "${{ steps.install-qt.outputs.qtPath }}/Qt/${{ steps.install-qt.outputs.qtVersion }}/mingw_64"
          $env:MINGW_ROOT = "${{ steps.install-qt.outputs.qtPath }}/Tools/mingw1310_64"
          cmake --build --preset build-mingw-release

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $qtRoot = "${{ steps.install-qt.outputs.qtPath }}/Qt/${{ steps.install-qt.outputs.qtVersion }}/mingw_64"
          .\deploy.ps1 -QtRoot $qtRoot -Toolchain mingw -Config Release

      - name: Package artifacts
        id: package
        shell: pwsh
        run: |
          $tag = "${{ steps.release-tag.outputs.tag }}"
          $assetZip = "MediaPreviewClient-$tag-windows-x64.zip"
          if (Test-Path $assetZip) {
            Remove-Item $assetZip -Force
          }

          Compress-Archive -Path "dist/mingw-release/*" -DestinationPath $assetZip -Force
          Get-FileHash $assetZip -Algorithm SHA256 | ForEach-Object {
            "{0}  {1}" -f $_.Hash.ToLower(), $assetZip
          } | Set-Content "SHA256SUMS.txt" -Encoding UTF8

          if (Test-Path "scripts/install-windows.ps1") {
            Copy-Item "scripts/install-windows.ps1" "install-windows.ps1" -Force
          } else {
            @'
param(
    [string]$Owner = "tutuwu2019",
    [string]$Repo = "MediaPreview",
    [string]$InstallDir = "$env:LOCALAPPDATA\MediaPreviewClient"
)

$ErrorActionPreference = "Stop"
$releaseApi = "https://api.github.com/repos/$Owner/$Repo/releases/latest"
$release = Invoke-RestMethod -Uri $releaseApi -Headers @{"User-Agent" = "MediaPreviewClient-Installer"}
$zipAsset = $release.assets | Where-Object { $_.name -match '^MediaPreviewClient-.*-windows-x64\.zip$' } | Select-Object -First 1
if (-not $zipAsset) { throw "No installable asset found." }
if (Test-Path $InstallDir) { Remove-Item $InstallDir -Recurse -Force }
New-Item -ItemType Directory -Path $InstallDir -Force | Out-Null
$tmpZip = Join-Path $env:TEMP $zipAsset.name
Invoke-WebRequest -Uri $zipAsset.browser_download_url -OutFile $tmpZip
Expand-Archive -Path $tmpZip -DestinationPath $InstallDir -Force
Start-Process -FilePath (Join-Path $InstallDir "MediaPreviewClient.exe")
'@ | Set-Content "install-windows.ps1" -Encoding UTF8
          }

          "zip_name=$assetZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          files: |
            ${{ steps.package.outputs.zip_name }}
            SHA256SUMS.txt
            install-windows.ps1
          generate_release_notes: true
